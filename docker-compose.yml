services:

  backend:
    build: .
    container_name: ai_career_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/aicareer
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3:8b
      # Optional: when set, exercises are generated with Gemini instead of Ollama.
      # Add it via your shell/env, not hardcoded in the repo.
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
    # DNS fix for intermittent "Name or service not known" / connect failures
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - ai_career_net

  ollama:
    image: ollama/ollama:latest
    container_name: ai_career_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_career_net

  postgres:
    image: postgres:15
    container_name: ai_career_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aicareer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_career_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: ai_career_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ai_career_net

volumes:
  postgres_data:
  ollama_data:

networks:
  ai_career_net: